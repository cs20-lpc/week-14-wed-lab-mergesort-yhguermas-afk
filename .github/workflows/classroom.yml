name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: compile
      id: compile
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: compile
        setup-command: ''
        command: g++ --std=c++17 arraymerge.cpp -o arraymerge
        timeout: 10
        max-score: 10
    - name: compile linked list merge
      id: compile-linked-list-merge
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: compile linked list merge
        setup-command: ''
        command: g++ --std=c++17 linkedlistmerge.cpp -o linkedlistmerge
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        COMPILE_RESULTS: "${{steps.compile.outputs.result}}"
        COMPILE-LINKED-LIST-MERGE_RESULTS: "${{steps.compile-linked-list-merge.outputs.result}}"
      with:
        runners: compile,compile-linked-list-merge
